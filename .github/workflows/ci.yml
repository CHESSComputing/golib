name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Start MongoDB
        uses: MongoCamp/mongodb-github-action@1.3.0
        with:
          mongodb-version: ${{ matrix.mongodb-version }}
          mongodb-port: 8230

#      - name: Verify formatting
#        run: |
#          test -z "$(gofmt -l .)"

      - name: Run tests
        run: make test

  dependabot-policy:
    if: github.actor == 'dependabot[bot]'

    runs-on: ubuntu-latest

    steps:
      - run: |
          echo "Dependabot PR detected"
